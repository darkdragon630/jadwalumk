
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Upload Jadwal</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;margin:0;padding:20px}
input{display:block;margin-bottom:10px;padding:8px;width:250px}
button{padding:10px 15px;border:none;border-radius:6px;background:#22c55e;color:black;cursor:pointer}
</style>
</head>
<body>

<h1>Upload Jadwal</h1>

<form id="form">
<input type="text" id="matkul" placeholder="Mata Kuliah" required>
<input type="text" id="hari" placeholder="Hari" required>
<input type="text" id="jam" placeholder="Jam" required>
<button type="submit">Simpan</button>
</form>

<script>
document.getElementById("form").addEventListener("submit",function(e){
 e.preventDefault();

 const matkul=document.getElementById("matkul").value;
 const hari=document.getElementById("hari").value;
 const jam=document.getElementById("jam").value;

 const data = JSON.parse(localStorage.getItem("jadwal_umk") || "[]");

 data.push({matkul,hari,jam});

 localStorage.setItem("jadwal_umk",JSON.stringify(data));

 alert("Jadwal tersimpan!");
 window.location="index.html";
});
</script>

</body>
</html>
